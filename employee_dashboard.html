<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو المحتوى الرياضي - رمضان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .tab-active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .tab-inactive { border-color: transparent; color: #6b7280; }
        .tab-inactive:hover { color: #374151; background: #f9fafb; }
        .log-line { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .char-ok { color: #16a34a; }
        .char-warn { color: #d97706; }
        .char-over { color: #dc2626; }
    </style>
</head>

<body class="bg-slate-100 min-h-screen p-4">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center -mt-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center space-y-6">
            <div class="mx-auto w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-4xl">🔐</div>
            <h1 class="text-xl font-bold text-gray-800">تسجيل الدخول</h1>
            <p class="text-gray-500 text-sm">أدخل بيانات المشرف للوصول إلى لوحة التحكم</p>
            <div class="space-y-3 text-right">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">اسم المستخدم</label>
                    <input id="loginUser" type="text" placeholder="اسم المستخدم"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">كلمة المرور</label>
                    <input id="loginPass" type="password" placeholder="كلمة المرور"
                        onkeydown="if(event.key==='Enter')doLogin()"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>
            <button onclick="doLogin()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">
                دخول
            </button>
            <div id="loginError" class="text-sm font-semibold text-red-600 hidden"></div>
        </div>
    </div>

    <!-- Dashboard (hidden until login) -->
    <div id="dashboardMain" class="max-w-2xl mx-auto space-y-4 hidden">

        <!-- Header -->
        <div class="text-center pt-4">
            <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl mb-3">🌙</div>
            <h1 class="text-2xl font-bold text-gray-800">استوديو رمضان الرياضي</h1>
            <p class="text-gray-500 text-sm">نشر التغريدات + توليد المحتوى بالذكاء الاصطناعي</p>
            <button onclick="doLogout()" class="mt-2 text-xs text-red-500 hover:text-red-700 font-bold">تسجيل الخروج</button>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 bg-white rounded-t-xl px-2 pt-2">
            <button onclick="switchTab('post')" id="tabPost"
                class="flex-1 py-3 px-4 text-sm font-bold border-b-2 rounded-t-lg transition tab-active">
                🚀 نشر التغريدة
            </button>
            <button onclick="switchTab('studio')" id="tabStudio"
                class="flex-1 py-3 px-4 text-sm font-bold border-b-2 rounded-t-lg transition tab-inactive">
                🧠 استوديو المحتوى
            </button>
        </div>

        <!-- Tab 1: Tweet Posting -->
        <div id="panelPost" class="bg-white rounded-b-xl shadow-xl p-8 text-center space-y-6">
            <p class="text-gray-500 text-sm">اضغط الزر لنشر التغريدة المجدولة لليوم مباشرة على حساب X.</p>

            <button id="postBtn" onclick="triggerPost()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg flex justify-center items-center gap-2">
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btnText">نشر تغريدة اليوم الآن 🚀</span>
            </button>

            <div id="statusMsg" class="text-sm font-semibold rounded-lg p-3 hidden"></div>
        </div>

        <!-- Tab 2: Content Studio -->
        <div id="panelStudio" class="bg-white rounded-b-xl shadow-xl p-6 space-y-5 hidden">

            <!-- Topic -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">الموضوع</label>
                <input id="topic" type="text" placeholder="مثال: فوائد القرفصاء، التغذية قبل التمرين..."
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- Selectors Row -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">الفئة</label>
                    <select id="category" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-xs bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="تحفيز رياضي">تحفيز رياضي</option>
                        <option value="تغذية رياضية">تغذية رياضية</option>
                        <option value="أحاديث نبوية">أحاديث نبوية</option>
                        <option value="تمارين وحركات">تمارين وحركات</option>
                        <option value="رمضان والرياضة">رمضان والرياضة</option>
                        <option value="صحة عامة">صحة عامة</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">المصدر</label>
                    <select id="source" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-xs bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="رياضة عامة">رياضة عامة</option>
                        <option value="تغذية رياضية علمية">تغذية علمية</option>
                        <option value="أحاديث وسنة">أحاديث وسنة</option>
                        <option value="ثقافة خليجية">ثقافة خليجية</option>
                        <option value="طب رياضي">طب رياضي</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">الأسلوب</label>
                    <select id="style" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-xs bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="تحفيزي">تحفيزي</option>
                        <option value="تعليمي">تعليمي</option>
                        <option value="تحدي">تحدي</option>
                        <option value="سؤال تفاعلي">سؤال تفاعلي</option>
                        <option value="قصة قصيرة">قصة قصيرة</option>
                    </select>
                </div>
            </div>

            <!-- Generate Button -->
            <button id="genBtn" onclick="generateContent()"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl transition shadow-lg flex justify-center items-center gap-2">
                <svg id="genSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="genBtnText">توليد المحتوى 🧠</span>
            </button>

            <!-- Live Log -->
            <div id="logArea" class="hidden">
                <div class="bg-gray-900 rounded-lg p-4 text-xs font-mono text-green-400 max-h-40 overflow-y-auto" id="logBox"></div>
            </div>

            <!-- Generated Posts -->
            <div id="postsArea" class="space-y-4 hidden"></div>

            <!-- Saved Posts -->
            <div id="savedSection" class="hidden">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-bold text-gray-700">📌 المنشورات المحفوظة</h3>
                    <button onclick="clearSaved()" class="text-xs text-red-500 hover:text-red-700">مسح الكل</button>
                </div>
                <div id="savedList" class="space-y-2"></div>
            </div>
        </div>
    </div>
    </div>

    <script>
        const WORKER_URL = "https://ramadan-tweet-proxy.op-younis.workers.dev";
        const AUTH_HASH = "5448ebd00a20dc3fb30692d93fd4a298eaded7289cf4da027a38e9b4003f0274";

        // ── Authentication ──
        async function sha256(text) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const hash = await sha256(user + ':' + pass);

            if (hash === AUTH_HASH) {
                sessionStorage.setItem('authed', 'true');
                showDashboard();
            } else {
                const err = document.getElementById('loginError');
                err.textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
                err.classList.remove('hidden');
            }
        }

        function doLogout() {
            sessionStorage.removeItem('authed');
            document.getElementById('dashboardMain').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardMain').classList.remove('hidden');
        }

        // Auto-login if session exists
        if (sessionStorage.getItem('authed') === 'true') showDashboard();

        // ── Tab Switching ──
        function switchTab(tab) {
            const isPost = tab === 'post';
            document.getElementById('panelPost').classList.toggle('hidden', !isPost);
            document.getElementById('panelStudio').classList.toggle('hidden', isPost);
            document.getElementById('tabPost').className = `flex-1 py-3 px-4 text-sm font-bold border-b-2 rounded-t-lg transition ${isPost ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('tabStudio').className = `flex-1 py-3 px-4 text-sm font-bold border-b-2 rounded-t-lg transition ${isPost ? 'tab-inactive' : 'tab-active'}`;
            if (!isPost) renderSaved();
        }

        // ── Tweet Posting (Tab 1) ──
        async function triggerPost() {
            const btn = document.getElementById('postBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-blue-400');
            spinner.classList.remove('hidden');
            btnText.textContent = "جاري إرسال الطلب...";
            hideMsg();

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.ok) {
                    showSuccess("تم إرسال أمر النشر بنجاح! سيتم النشر خلال أقل من دقيقة.");
                } else {
                    showError("خطأ في الإرسال: " + (data.error || response.status));
                }
            } catch (error) {
                showError("خطأ بالاتصال: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.replace('bg-blue-400', 'bg-blue-600');
                spinner.classList.add('hidden');
                btnText.textContent = "نشر تغريدة اليوم الآن 🚀";
            }
        }

        function showSuccess(msg) {
            const s = document.getElementById('statusMsg');
            s.textContent = msg;
            s.className = "text-sm font-semibold rounded-lg p-3 bg-green-50 text-green-700 block";
        }
        function showError(msg) {
            const s = document.getElementById('statusMsg');
            s.textContent = msg;
            s.className = "text-sm font-semibold rounded-lg p-3 bg-red-50 text-red-700 block";
        }
        function hideMsg() {
            document.getElementById('statusMsg').className = "hidden";
        }

        // ── Content Generation (Tab 2) ──
        const logSteps = [
            "جاري تحليل الموضوع...",
            "البحث في المصادر الرياضية...",
            "مراجعة المعلومات العلمية...",
            "صياغة المنشورات بالأسلوب المطلوب...",
            "تحسين الهاشتاقات والإيموجي...",
            "التحقق من عدد الأحرف...",
        ];

        async function generateContent() {
            const topic = document.getElementById('topic').value.trim();
            if (!topic) { alert("اكتب الموضوع أولاً"); return; }

            const btn = document.getElementById('genBtn');
            const spinner = document.getElementById('genSpinner');
            const btnText = document.getElementById('genBtnText');
            const logArea = document.getElementById('logArea');
            const logBox = document.getElementById('logBox');
            const postsArea = document.getElementById('postsArea');

            btn.disabled = true;
            btn.classList.replace('bg-emerald-600', 'bg-emerald-400');
            spinner.classList.remove('hidden');
            btnText.textContent = "جاري التوليد...";
            logArea.classList.remove('hidden');
            logBox.innerHTML = '';
            postsArea.classList.add('hidden');
            postsArea.innerHTML = '';

            // Animate log steps
            let logInterval;
            let stepIdx = 0;
            function addLog(text) {
                logBox.innerHTML += `<div class="log-line py-0.5">▸ ${text}</div>`;
                logBox.scrollTop = logBox.scrollHeight;
            }
            addLog(logSteps[0]);
            logInterval = setInterval(() => {
                stepIdx++;
                if (stepIdx < logSteps.length) addLog(logSteps[stepIdx]);
            }, 1500);

            try {
                const response = await fetch(WORKER_URL + "/generate", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic,
                        category: document.getElementById('category').value,
                        source: document.getElementById('source').value,
                        style: document.getElementById('style').value,
                    })
                });

                clearInterval(logInterval);
                const data = await response.json();

                if (data.ok && data.posts) {
                    addLog("تم التوليد بنجاح! ✅");
                    renderPosts(data.posts);
                } else {
                    addLog("❌ خطأ: " + (data.error || "فشل التوليد"));
                }
            } catch (error) {
                clearInterval(logInterval);
                addLog("❌ خطأ بالاتصال: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.replace('bg-emerald-400', 'bg-emerald-600');
                spinner.classList.add('hidden');
                btnText.textContent = "توليد المحتوى 🧠";
            }
        }

        function renderPosts(posts) {
            const area = document.getElementById('postsArea');
            area.classList.remove('hidden');
            area.innerHTML = posts.map((p, i) => {
                const len = p.text.length;
                const charClass = len <= 250 ? 'char-ok' : len <= 280 ? 'char-warn' : 'char-over';
                return `
                <div class="border border-gray-200 rounded-xl p-4 space-y-3 bg-gray-50">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-blue-600">منشور ${i + 1}</span>
                        <span class="text-xs font-bold ${charClass}">${len}/280</span>
                    </div>
                    <p class="text-sm text-gray-800 leading-relaxed whitespace-pre-line" dir="rtl">${escapeHtml(p.text)}</p>
                    <div class="grid grid-cols-1 gap-1.5 text-xs text-gray-500">
                        <div>🎯 <strong>الجذب:</strong> ${escapeHtml(p.hook || '')}</div>
                        <div>💡 <strong>نصيحة التفاعل:</strong> ${escapeHtml(p.engagement_tip || '')}</div>
                        <div>⏰ <strong>أفضل وقت:</strong> ${escapeHtml(p.best_time || '')}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="publishTweet(this)" data-text="${btoa(unescape(encodeURIComponent(p.text)))}"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 px-3 rounded-lg transition">
                            🚀 نشر على X
                        </button>
                        <button onclick="copyPost(this, ${i})" data-text="${btoa(unescape(encodeURIComponent(p.text)))}"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-3 rounded-lg transition">
                            📋 نسخ
                        </button>
                        <button onclick="savePost(${i})" data-post='${JSON.stringify(p).replace(/'/g, "&#39;")}'
                            class="flex-1 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-2 px-3 rounded-lg transition">
                            📌 حفظ
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        async function publishTweet(btn) {
            const text = decodeURIComponent(escape(atob(btn.dataset.text)));
            const original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = "جاري النشر...";
            btn.classList.replace('bg-green-600', 'bg-gray-400');

            try {
                const response = await fetch(WORKER_URL + "/tweet", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                if (data.ok) {
                    btn.innerHTML = "✅ تم النشر!";
                    btn.classList.replace('bg-gray-400', 'bg-green-600');
                    setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 3000);
                } else {
                    btn.innerHTML = "❌ فشل";
                    btn.classList.replace('bg-gray-400', 'bg-red-600');
                    setTimeout(() => { btn.innerHTML = original; btn.classList.replace('bg-red-600', 'bg-green-600'); btn.disabled = false; }, 3000);
                }
            } catch (e) {
                btn.innerHTML = "❌ خطأ";
                btn.classList.replace('bg-gray-400', 'bg-red-600');
                setTimeout(() => { btn.innerHTML = original; btn.classList.replace('bg-red-600', 'bg-green-600'); btn.disabled = false; }, 3000);
            }
        }

        function copyPost(btn, idx) {
            const text = decodeURIComponent(escape(atob(btn.dataset.text)));
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = "✅ تم النسخ!";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => { btn.innerHTML = original; btn.classList.replace('bg-green-600', 'bg-blue-600'); }, 1500);
            });
        }

        // ── Saved Posts (localStorage) ──
        function getSaved() {
            try { return JSON.parse(localStorage.getItem('savedPosts') || '[]'); } catch { return []; }
        }

        function savePost(idx) {
            const area = document.getElementById('postsArea');
            const card = area.children[idx];
            const btn = card.querySelector('[data-post]');
            const post = JSON.parse(btn.dataset.post);
            const saved = getSaved();
            saved.unshift({ ...post, savedAt: new Date().toLocaleString('ar-SA') });
            localStorage.setItem('savedPosts', JSON.stringify(saved.slice(0, 50)));
            btn.innerHTML = "✅ تم الحفظ!";
            btn.classList.replace('bg-amber-500', 'bg-green-600');
            setTimeout(() => { btn.innerHTML = "📌 حفظ"; btn.classList.replace('bg-green-600', 'bg-amber-500'); }, 1500);
            renderSaved();
        }

        function renderSaved() {
            const saved = getSaved();
            const section = document.getElementById('savedSection');
            const list = document.getElementById('savedList');
            if (saved.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            list.innerHTML = saved.map((p, i) => `
                <div class="border border-amber-200 rounded-lg p-3 bg-amber-50 text-sm">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs text-gray-400">${p.savedAt || ''}</span>
                        <button onclick="removeSaved(${i})" class="text-xs text-red-400 hover:text-red-600">حذف</button>
                    </div>
                    <p class="text-gray-800 whitespace-pre-line text-xs leading-relaxed">${escapeHtml(p.text)}</p>
                    <button onclick="navigator.clipboard.writeText(${JSON.stringify(p.text).replace(/"/g, '&quot;')})"
                        class="mt-2 text-xs text-blue-600 hover:text-blue-800 font-bold">📋 نسخ</button>
                </div>
            `).join('');
        }

        function removeSaved(idx) {
            const saved = getSaved();
            saved.splice(idx, 1);
            localStorage.setItem('savedPosts', JSON.stringify(saved));
            renderSaved();
        }

        function clearSaved() {
            if (confirm("حذف جميع المنشورات المحفوظة؟")) {
                localStorage.removeItem('savedPosts');
                renderSaved();
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>

</html>
