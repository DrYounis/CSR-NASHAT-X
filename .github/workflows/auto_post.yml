name: Auto Post Ramadan Hadith

on:
  push:
    branches:
      - main
  schedule:
    # Runs at 13:00 UTC every day.
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub UI
  repository_dispatch:
    types: [employee_manual_post, custom_tweet]
    # Allows triggering from external employee dashboard

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to ensure we can push back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ramadan Bot
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          CUSTOM_TWEET_TEXT: ${{ github.event.client_payload.tweet_text || '' }}
        run: |
          if [ -n "$CUSTOM_TWEET_TEXT" ]; then
            python ramadan_bot.py --custom-text "$CUSTOM_TWEET_TEXT"
          else
            python ramadan_bot.py --auto
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add posted_log.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted log [skip ci]" && git push)
