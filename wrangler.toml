name = "ramadan-tweet-proxy"
main = "cloudflare_worker.js"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Rate limiting KV namespace (create with: wrangler kv:namespace create RATE_LIMITS)
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "RATE_LIMITS_ID_PLACEHOLDER"
